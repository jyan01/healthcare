name: Deploy health-web

on:
  push:
    branches: [main]
    paths:
      - "health-web/**"
      - "shared/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # docker-compose.yml의 build.args 매핑과 이름을 맞춘 값들.
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rsync는 원격지에 없는 상위 디렉터리를 자동으로 만들어주지 않으므로
      # (mkdir이 마지막 한 단계만 시도하다 부모 경로가 없으면 실패) 업로드 전에 미리 생성해둔다.
      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: FRONTEND_PORT
          script: |
            set -e
            mkdir -p ~/deploy/health-web-$FRONTEND_PORT/health-web
            mkdir -p ~/deploy/health-web-$FRONTEND_PORT/shared

      # FRONTEND_PORT를 네임스페이스로 쓰는 학생별 소스 디렉터리로 업로드.
      # tsconfig include(../shared/**/*.ts) 때문에 health-web/ 뿐 아니라 shared/ 도 같은
      # 상위 경로 아래 나란히 올려야 docker build 시 ../shared 참조가 성립한다.
      - name: Upload health-web/ to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: health-web/
          remote_path: ~/deploy/health-web-${{ vars.FRONTEND_PORT }}/health-web/
          remote_host: ${{ vars.SERVER_HOST }}
          remote_port: ${{ vars.SERVER_PORT }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Upload shared/ to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: shared/
          remote_path: ~/deploy/health-web-${{ vars.FRONTEND_PORT }}/shared/
          remote_host: ${{ vars.SERVER_HOST }}
          remote_port: ${{ vars.SERVER_PORT }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      # 서버에 SSH로 접속해 docker compose로 빌드/재기동.
      # env 파일을 만들지 않고, envs로 넘긴 값들을 docker-compose.yml의 ${VAR} 치환에 그대로 사용한다.
      - name: Build & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: FRONTEND_PORT,VITE_API_BASE_URL
          script: |
            set -e
            # VITE_WS_URL은 GitHub Variable로 별도 등록되어 있지 않으므로,
            # VITE_API_BASE_URL의 http(s) 스킴을 ws(s)로 바꿔 그대로 파생시킨다
            # (백엔드 WS는 REST와 같은 호스트·포트에서 서빙되므로 스킴만 다르면 된다).
            export VITE_WS_URL=$(echo "$VITE_API_BASE_URL" | sed -e 's#^https://#wss://#' -e 's#^http://#ws://#')
            cd ~/deploy/health-web-$FRONTEND_PORT/health-web
            docker compose up -d --build
            docker image prune -f
