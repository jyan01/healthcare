name: Deploy health-ai

on:
  push:
    branches: [main]
    paths:
      - "health-ai/**"
      - ".github/workflows/deploy-ai.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # docker-compose.yml의 environment: 매핑과 이름을 맞춘 값들.
      # (GitHub Secret/Variable에 없는 키는 docker-compose.yml에 고정값으로 이미 박혀 있으므로 여기서 다루지 않는다)
      AI_API_PORT: ${{ vars.AI_API_PORT }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rsync는 원격지에 없는 상위 디렉터리를 자동으로 만들어주지 않으므로
      # (mkdir이 마지막 한 단계만 시도하다 부모 경로가 없으면 실패) 업로드 전에 미리 생성해둔다.
      - name: Ensure remote directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: AI_API_PORT
          script: |
            set -e
            mkdir -p ~/deploy/health-ai-$AI_API_PORT

      # health-ai는 shared/(TS 전용)를 참조하지 않으므로 health-backend/health-web과 달리
      # health-ai/ 폴더 하나만 업로드하면 된다 (build context도 health-ai/ 자체).
      - name: Upload health-ai/ to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: health-ai/
          remote_path: ~/deploy/health-ai-${{ vars.AI_API_PORT }}/
          remote_host: ${{ vars.SERVER_HOST }}
          remote_port: ${{ vars.SERVER_PORT }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      # 서버에 SSH로 접속해 docker compose로 빌드/재기동.
      # env 파일을 만들지 않고, envs로 넘긴 값들을 docker-compose.yml의 ${VAR} 치환에 그대로 사용한다.
      - name: Build & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: AI_API_PORT,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD
          script: |
            set -e
            cd ~/deploy/health-ai-$AI_API_PORT
            docker compose up -d --build
            docker image prune -f
