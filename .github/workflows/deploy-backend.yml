name: Deploy health-backend

on:
  push:
    branches: [main]
    paths:
      - "health-backend/**"
      - "shared/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # docker-compose.yml의 environment: 매핑과 이름을 맞춘 값들.
      # (GitHub Secret/Variable에 없는 키는 docker-compose.yml에 고정값으로 이미 박혀 있으므로 여기서 다루지 않는다)
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_TTL_SEC: ${{ vars.JWT_ACCESS_TTL_SEC }}
      JWT_REFRESH_TTL_SEC: ${{ vars.JWT_REFRESH_TTL_SEC }}
      SIMULATOR_URL: ${{ vars.SIMULATOR_URL }}
      SIMULATOR_RECONNECT_ATTEMPTS: ${{ vars.SIMULATOR_RECONNECT_ATTEMPTS }}
      SIMULATOR_TIMEOUT_MS: ${{ vars.SIMULATOR_TIMEOUT_MS }}
      SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rsync는 원격지에 없는 상위 디렉터리를 자동으로 만들어주지 않으므로
      # (mkdir이 마지막 한 단계만 시도하다 부모 경로가 없으면 실패) 업로드 전에 미리 생성해둔다.
      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: BACKEND_PORT
          script: |
            set -e
            mkdir -p ~/deploy/health-backend-$BACKEND_PORT/health-backend
            mkdir -p ~/deploy/health-backend-$BACKEND_PORT/shared

      # BACKEND_PORT를 네임스페이스로 쓰는 학생별 소스 디렉터리로 업로드.
      # tsconfig rootDir(..) 때문에 health-backend/ 뿐 아니라 shared/ 도 같은
      # 상위 경로 아래 나란히 올려야 docker build 시 ../shared 참조가 성립한다.
      - name: Upload health-backend/ to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: health-backend/
          remote_path: ~/deploy/health-backend-${{ vars.BACKEND_PORT }}/health-backend/
          remote_host: ${{ vars.SERVER_HOST }}
          remote_port: ${{ vars.SERVER_PORT }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Upload shared/ to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: shared/
          remote_path: ~/deploy/health-backend-${{ vars.BACKEND_PORT }}/shared/
          remote_host: ${{ vars.SERVER_HOST }}
          remote_port: ${{ vars.SERVER_PORT }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      # 서버에 SSH로 접속해 docker compose로 빌드/재기동.
      # env 파일을 만들지 않고, envs로 넘긴 값들을 docker-compose.yml의 ${VAR} 치환에 그대로 사용한다.
      - name: Build & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: BACKEND_PORT,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,JWT_ACCESS_TTL_SEC,JWT_REFRESH_TTL_SEC,SIMULATOR_URL,SIMULATOR_RECONNECT_ATTEMPTS,SIMULATOR_TIMEOUT_MS,SLACK_WEBHOOK_URL,CORS_ORIGINS
          script: |
            set -e
            cd ~/deploy/health-backend-$BACKEND_PORT/health-backend
            docker compose up -d --build
            docker image prune -f
