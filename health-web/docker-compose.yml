# health-web 배포용 docker-compose.
#
# 학생마다 고유하게 배정된 FRONTEND_PORT를 네임스페이스로 사용한다.
#  - 프로젝트명(name)      : health-web-${FRONTEND_PORT}
#  - 이미지명               : health-web-${FRONTEND_PORT}:latest
#  - 컨테이너명             : health-web-${FRONTEND_PORT}
#
# .env 파일을 만들지 않고, `docker compose up` 을 실행하는 쉘의 환경변수를
# ${VAR} 로 그대로 치환해서 사용한다 (자세한 매핑은 docs/DEPLOY.md 참고).
#
# 필요한 셸 환경변수:
#   FRONTEND_PORT, VITE_API_BASE_URL, VITE_WS_URL
#
# 참고: 최상위 `name:` 필드는 Docker Compose v2.20+ 필요.
# 이보다 낮은 버전이면 `name:` 줄을 지우고 매 명령에 `-p health-web-${FRONTEND_PORT}` 를 붙인다.

name: health-web-${FRONTEND_PORT:?FRONTEND_PORT 환경변수가 필요합니다}

services:
  web:
    build:
      context: ..
      dockerfile: health-web/Dockerfile
      # VITE_API_BASE_URL/VITE_WS_URL은 런타임 environment가 아니라 빌드 args로 전달한다
      # (Vite는 빌드 시점에 import.meta.env 값을 번들에 굳혀 넣기 때문).
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:?}"
        VITE_WS_URL: "${VITE_WS_URL:?}"
    image: "health-web-${FRONTEND_PORT:?}:latest"
    container_name: "health-web-${FRONTEND_PORT:?}"
    restart: unless-stopped
    # 단일 서비스라 컨테이너 간 통신이 필요 없으므로, 프로젝트 전용 네트워크를 새로 만들지 않고
    # Docker 기본 bridge 네트워크를 그대로 사용한다. 공유 배포 서버에 프로젝트별 네트워크가
    # 계속 쌓여 "all predefined address pools have been fully subnetted" 에러가 나는 것을 방지한다.
    network_mode: bridge
    ports:
      - "${FRONTEND_PORT:?}:80"
