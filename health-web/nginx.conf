# health-web 정적 파일 서빙 + SPA(react-router-dom) 라우팅 설정.
# /members/:memberId 같은 클라이언트 사이드 라우트를 새로고침해도 404가 나지 않도록
# 존재하지 않는 경로는 전부 index.html로 fallback한다.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
