# health-ai 배포용 docker-compose.
#
# 학생마다 고유하게 배정된 AI_API_PORT를 네임스페이스로 사용한다.
#  - 프로젝트명(name)      : health-ai-${AI_API_PORT}
#  - 이미지명               : health-ai-${AI_API_PORT}:latest
#  - 컨테이너명             : health-ai-${AI_API_PORT}
#
# health-backend와 같은 배포 서버·DB를 공유하므로 DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD,
# SERVER_HOST/SERVER_PORT/SERVER_USER/SSH_KEY는 새로 등록하지 않고 기존 GitHub Secrets/Variables를
# 그대로 재사용한다 (자세한 매핑은 docs/DEPLOY.md 참고).
#
# .env 파일을 만들지 않고, `docker compose up` 을 실행하는 쉘의 환경변수를 ${VAR} 로 치환해서 사용한다.
#
# 필요한 셸 환경변수:
#   AI_API_PORT, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# 참고: 최상위 `name:` 필드는 Docker Compose v2.20+ 필요.
# 이보다 낮은 버전이면 `name:` 줄을 지우고 매 명령에 `-p health-ai-${AI_API_PORT}` 를 붙인다.

name: health-ai-${AI_API_PORT:?AI_API_PORT 환경변수가 필요합니다}

services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: "health-ai-${AI_API_PORT:?}:latest"
    container_name: "health-ai-${AI_API_PORT:?}"
    restart: unless-stopped
    # 단일 서비스라 컨테이너 간 통신이 필요 없으므로 Docker 기본 bridge 네트워크를 재사용한다
    # (공유 배포 서버의 네트워크 주소 풀 소진 문제를 피하기 위함 — health-web과 동일한 조치).
    network_mode: bridge
    ports:
      - "${AI_API_PORT:?}:${AI_API_PORT:?}"
    environment:
      AI_API_PORT: "${AI_API_PORT:?}"

      # PostgreSQL (health-backend와 동일 DB, GitHub 이름 = 앱이 읽는 이름 그대로)
      DB_HOST: "${DB_HOST:?}"
      DB_PORT: "${DB_PORT:?}"
      DB_NAME: "${DB_NAME:?}"
      DB_USER: "${DB_USER:?}"
      DB_PASSWORD: "${DB_PASSWORD:?}"

      # GitHub Secret/Variable에 없는 값 → 고정값 사용 (docs/DEPLOY.md 참고)
      OLLAMA_BASE_URL: "https://ai.iranglab.com"
      LLM_MODEL: "qwen2.5:3b"
      EMBED_MODEL: "bge-m3"
