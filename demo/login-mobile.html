<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 로그인 · Mobile (React Native)</title>
<style>
  :root {
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;
    --hairline: #e0e0e0;
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--canvas-parchment);
    color: var(--ink);
    font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .backdrop-label {
    position: fixed;
    top: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.12px;
    color: var(--ink-muted-48);
  }

  /* 디바이스 프레임 — React Native 세로형 화면 검증용 목업 */
  .device {
    width: 375px;
    max-width: 100%;
    height: 812px;
    max-height: calc(100vh - 64px);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    flex: 0 0 auto;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    color: var(--ink);
  }

  .screen {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 28px;
    overflow-y: auto;
  }

  .mark {
    width: 36px;
    height: 36px;
    color: var(--primary);
    margin: 0 auto 20px;
  }
  .mark svg { width: 100%; height: 100%; }

  h1 {
    font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
    font-size: 21px;
    font-weight: 600;
    line-height: 1.19;
    letter-spacing: 0.231px;
    margin: 0 0 8px;
    color: var(--ink);
    text-align: center;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
    margin: 0 0 32px;
    text-align: center;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    color: var(--ink-muted-80);
    margin: 0 0 6px;
  }

  .field input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--canvas);
    color: var(--ink);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    outline: none;
    transition: border-color 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .field input::placeholder { color: #b4b7c6; }

  .field input:focus {
    border-color: var(--primary-focus);
    outline: 2px solid var(--primary-focus);
    outline-offset: -1px;
  }

  .login-button {
    width: 100%;
    height: 48px;
    margin-top: 12px;
    border: none;
    border-radius: 9999px;
    background: var(--primary);
    color: #ffffff;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    transition: transform 0.1s ease;
  }

  .login-button:active { transform: scale(0.95); }

  .signup-row {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .signup-row a { color: var(--primary); text-decoration: none; }

  .home-indicator {
    flex: 0 0 auto;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .home-indicator span {
    width: 120px;
    height: 4px;
    border-radius: 2px;
    background: var(--ink);
    opacity: 0.25;
  }
</style>
</head>
<body>
  <div class="backdrop-label">React Native 목업 — 세로형(Portrait) 검증용</div>

  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●</span>
    </div>

    <div class="screen">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7.5-4.6-9.6-9.1C.8 8.1 2.3 4.8 5.6 4.1c2-.4 3.8.5 5 2.1.9-1.6 2.8-2.5 4.8-2.1 3.3.7 4.8 4 3.2 7.8C16.5 16.4 12 21 12 21z"/>
        </svg>
      </div>

      <h1>관리자 로그인</h1>
      <p class="subtitle">의사 · 환자 계정으로 로그인하세요</p>

      <form>
        <div class="field">
          <label for="username">아이디</label>
          <input id="username" type="text" placeholder="아이디를 입력하세요" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">암호</label>
          <input id="password" type="password" placeholder="암호를 입력하세요" autocomplete="current-password">
        </div>

        <button class="login-button" type="submit">로그인</button>
      </form>

      <p class="signup-row">계정이 없으신가요? <a href="#">가입하기</a></p>
    </div>

    <div class="home-indicator"><span></span></div>
  </div>
</body>
</html>
