<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>환자 목록 · Mobile (React Native)</title>
<style>
  :root {
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;
    --hairline: #e0e0e0;
    --divider-soft: #f0f0f0;
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
    --chip-translucent: rgba(210, 210, 215, 0.64);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--canvas-parchment);
    color: var(--ink);
    font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .backdrop-label {
    position: fixed;
    top: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.12px;
    color: var(--ink-muted-48);
  }

  .device {
    width: 375px;
    max-width: 100%;
    height: 812px;
    max-height: calc(100vh - 64px);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    flex: 0 0 auto;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    color: var(--ink);
  }

  .nav-title {
    flex: 0 0 auto;
    padding: 4px 20px 16px;
  }

  .nav-title h1 {
    font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.374px;
    margin: 0 0 2px;
  }

  .nav-title .count {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .toolbar {
    flex: 0 0 auto;
    padding: 0 20px 12px;
  }

  .search-input {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 16px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 9999px;
    background: var(--canvas-parchment);
    margin-bottom: 10px;
  }

  .search-input svg {
    width: 13px;
    height: 13px;
    color: var(--ink-muted-48);
    flex: 0 0 auto;
  }

  .search-input input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    letter-spacing: -0.224px;
    color: var(--ink);
    background: transparent;
  }

  .search-input input::placeholder { color: #b4b7c6; }

  .gender-filter {
    display: flex;
    gap: 8px;
  }

  .chip {
    height: 32px;
    padding: 0 14px;
    border-radius: 9999px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    color: var(--ink);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.224px;
  }

  .chip.selected {
    border: 2px solid var(--primary-focus);
    font-weight: 600;
  }

  .list {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 0 20px;
  }

  .patient-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--divider-soft);
    text-decoration: none;
    color: inherit;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 9999px;
    background: var(--chip-translucent);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.224px;
    flex: 0 0 auto;
  }

  .info { flex: 1; min-width: 0; }

  .name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.374px;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .meta {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .chevron {
    color: var(--ink-muted-48);
    width: 11px;
    height: 11px;
    flex: 0 0 auto;
  }

  .home-indicator {
    flex: 0 0 auto;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .home-indicator span {
    width: 120px;
    height: 4px;
    border-radius: 2px;
    background: var(--ink);
    opacity: 0.25;
  }
</style>
</head>
<body>
  <div class="backdrop-label">React Native 목업 — 세로형(Portrait) 검증용</div>

  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●</span>
    </div>

    <div class="nav-title">
      <h1>환자 목록</h1>
      <div class="count" id="count">총 8명</div>
    </div>

    <div class="toolbar">
      <div class="search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="이름으로 검색">
      </div>
      <div class="gender-filter" id="genderFilter">
        <button class="chip selected" data-gender="all" type="button">전체</button>
        <button class="chip" data-gender="M" type="button">남</button>
        <button class="chip" data-gender="F" type="button">여</button>
      </div>
    </div>

    <div class="list" id="patientList"></div>

    <div class="home-indicator"><span></span></div>
  </div>

  <script>
    const patients = [
      { name: "박지훈", gender: "M", birth: "1980-04-12" },
      { name: "김민서", gender: "F", birth: "1975-11-03" },
      { name: "이서준", gender: "M", birth: "1990-02-27" },
      { name: "정하은", gender: "F", birth: "1988-08-19" },
      { name: "최도윤", gender: "M", birth: "1965-06-30" },
      { name: "강지우", gender: "F", birth: "1993-01-08" },
      { name: "윤성민", gender: "M", birth: "1972-09-15" },
      { name: "한소율", gender: "F", birth: "1999-05-22" },
    ];

    const listEl = document.getElementById("patientList");
    const countEl = document.getElementById("count");
    const searchEl = document.getElementById("search");
    const genderButtons = document.querySelectorAll("#genderFilter .chip");
    let genderValue = "all";

    function initials(name) {
      return name.slice(-2);
    }

    function render() {
      const keyword = searchEl.value.trim();
      const filtered = patients.filter(p =>
        (genderValue === "all" || p.gender === genderValue) &&
        p.name.includes(keyword)
      );

      countEl.textContent = `총 ${filtered.length}명`;
      listEl.innerHTML = filtered.map(p => `
        <a class="patient-row" href="./patient-detail-mobile.html">
          <span class="avatar">${initials(p.name)}</span>
          <span class="info">
            <div class="name">${p.name}</div>
            <div class="meta">${p.gender === "M" ? "남" : "여"} · ${p.birth}</div>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      `).join("");
    }

    searchEl.addEventListener("input", render);
    genderButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        genderButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        genderValue = btn.dataset.gender;
        render();
      });
    });

    render();
  </script>
</body>
</html>
