<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>환자 목록 · Web</title>
<style>
  :root {
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;
    --hairline: #e0e0e0;
    --divider-soft: #f0f0f0;
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
    --chip-translucent: rgba(210, 210, 215, 0.64);
    --surface-black: #000000;
    --on-dark: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--canvas);
    color: var(--ink);
    font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
  }

  .global-nav {
    height: 44px;
    background: var(--surface-black);
    color: var(--on-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.12px;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 8px;
  }

  h1 {
    font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.374px;
    margin: 0;
    color: var(--ink);
  }

  .count {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  /* 검색 & 필터 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1 1 280px;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 44px;
    padding: 0 20px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 9999px;
    background: var(--canvas);
  }

  .search-input svg {
    width: 14px;
    height: 14px;
    color: var(--ink-muted-48);
    flex: 0 0 auto;
  }

  .search-input input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    color: var(--ink);
    background: transparent;
  }

  .search-input input::placeholder { color: #b4b7c6; }

  .gender-filter {
    display: flex;
    gap: 8px;
  }

  .chip {
    height: 44px;
    padding: 0 16px;
    border-radius: 9999px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    color: var(--ink);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    cursor: pointer;
  }

  .chip.selected {
    border: 2px solid var(--primary-focus);
    font-weight: 600;
  }

  /* 목록 테이블 (데스크톱) */
  .list-header {
    display: grid;
    grid-template-columns: 56px 1fr 88px 140px 24px;
    align-items: center;
    gap: 16px;
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--hairline);
  }

  .list-header span {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .patient-row {
    display: grid;
    grid-template-columns: 56px 1fr 88px 140px 24px;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--divider-soft);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .patient-row:hover { background: var(--canvas-parchment); }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 9999px;
    background: var(--chip-translucent);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    flex: 0 0 auto;
    overflow: hidden;
  }

  .name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.374px;
    color: var(--ink);
  }

  .gender {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .birth {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }

  .chevron {
    color: var(--ink-muted-48);
    width: 12px;
    height: 12px;
  }

  /* 반응형: 640px 이하 — 테이블 헤더 숨기고 스택형 리스트로 전환 */
  @media (max-width: 640px) {
    .page { padding: 32px 16px 64px; }
    h1 { font-size: 24px; }
    .list-header { display: none; }
    .patient-row {
      grid-template-columns: 44px 1fr 24px;
      grid-template-rows: auto auto;
    }
    .name { grid-column: 2; grid-row: 1; }
    .gender, .birth {
      grid-column: 2;
      grid-row: 2;
    }
    .gender::after { content: " · "; }
    .chevron { grid-row: 1 / 3; }
  }
</style>
</head>
<body>
  <div class="global-nav">HEALTH ADMIN — WEB</div>

  <div class="page">
    <div class="page-header">
      <h1>환자 목록</h1>
      <span class="count" id="count">총 8명</span>
    </div>

    <div class="toolbar">
      <div class="search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="이름으로 검색">
      </div>
      <div class="gender-filter" id="genderFilter">
        <button class="chip selected" data-gender="all" type="button">전체</button>
        <button class="chip" data-gender="M" type="button">남</button>
        <button class="chip" data-gender="F" type="button">여</button>
      </div>
    </div>

    <div class="list-header">
      <span></span>
      <span>이름</span>
      <span>성별</span>
      <span>생년월일</span>
      <span></span>
    </div>

    <div id="patientList"></div>
  </div>

  <script>
    const patients = [
      { name: "박지훈", gender: "M", birth: "1980-04-12" },
      { name: "김민서", gender: "F", birth: "1975-11-03" },
      { name: "이서준", gender: "M", birth: "1990-02-27" },
      { name: "정하은", gender: "F", birth: "1988-08-19" },
      { name: "최도윤", gender: "M", birth: "1965-06-30" },
      { name: "강지우", gender: "F", birth: "1993-01-08" },
      { name: "윤성민", gender: "M", birth: "1972-09-15" },
      { name: "한소율", gender: "F", birth: "1999-05-22" },
    ];

    const listEl = document.getElementById("patientList");
    const countEl = document.getElementById("count");
    const searchEl = document.getElementById("search");
    const genderButtons = document.querySelectorAll("#genderFilter .chip");
    let genderValue = "all";

    function initials(name) {
      return name.slice(-2);
    }

    function render() {
      const keyword = searchEl.value.trim();
      const filtered = patients.filter(p =>
        (genderValue === "all" || p.gender === genderValue) &&
        p.name.includes(keyword)
      );

      countEl.textContent = `총 ${filtered.length}명`;
      listEl.innerHTML = filtered.map(p => `
        <a class="patient-row" href="./patient-detail-web.html">
          <span class="avatar">${initials(p.name)}</span>
          <span class="name">${p.name}</span>
          <span class="gender">${p.gender === "M" ? "남" : "여"}</span>
          <span class="birth">${p.birth}</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      `).join("");
    }

    searchEl.addEventListener("input", render);
    genderButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        genderButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        genderValue = btn.dataset.gender;
        render();
      });
    });

    render();
  </script>
</body>
</html>
