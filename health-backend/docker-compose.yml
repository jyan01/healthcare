# health-backend 배포용 docker-compose.
#
# 학생마다 고유하게 배정된 BACKEND_PORT를 네임스페이스로 사용한다.
#  - 프로젝트명(name)      : health-backend-${BACKEND_PORT}
#  - 이미지명               : health-backend-${BACKEND_PORT}:latest
#  - 컨테이너명             : health-backend-${BACKEND_PORT}
#  - (docker volume/network는 name: 을 통해 프로젝트명으로 자동 접두)
#
# .env 파일을 만들지 않고, `docker compose up` 을 실행하는 쉘의 환경변수를
# ${VAR} 로 그대로 치환해서 사용한다. 아래 environment 값들은
# GitHub Secrets/Variables에 등록된 "이름 그대로" 참조하고,
# 실제 앱이 읽는 .env 키 이름으로 매핑한다 (자세한 매핑표는 docs/DEPLOY.md 참고).
#
# 필요한 셸 환경변수:
#   BACKEND_PORT, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD,
#   JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, JWT_ACCESS_TTL_SEC, JWT_REFRESH_TTL_SEC,
#   SIMULATOR_URL, SIMULATOR_RECONNECT_ATTEMPTS, SIMULATOR_TIMEOUT_MS, SLACK_WEBHOOK_URL,
#   CORS_ORIGINS
#
# 참고: 최상위 `name:` 필드는 Docker Compose v2.20+ 필요.
# 이보다 낮은 버전이면 `name:` 줄을 지우고 매 명령에 `-p health-backend-${BACKEND_PORT}` 를 붙인다.

name: health-backend-${BACKEND_PORT:?BACKEND_PORT 환경변수가 필요합니다}

services:
  backend:
    build:
      context: ..
      dockerfile: health-backend/Dockerfile
    image: "health-backend-${BACKEND_PORT:?}:latest"
    container_name: "health-backend-${BACKEND_PORT:?}"
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:?}:${BACKEND_PORT:?}"
    environment:
      # 서버
      PORT: "${BACKEND_PORT:?}"

      # CORS 허용 도메인 (프론트엔드 오리진, 콤마 구분)
      CORS_ORIGINS: "${CORS_ORIGINS:?}"

      # PostgreSQL (GitHub 이름 = 앱 이름, 그대로 매핑)
      DB_HOST: "${DB_HOST:?}"
      DB_PORT: "${DB_PORT:?}"
      DB_NAME: "${DB_NAME:?}"
      DB_USER: "${DB_USER:?}"
      DB_PASSWORD: "${DB_PASSWORD:?}"

      # JWT (GitHub 이름 → 앱이 읽는 .env 키로 매핑)
      JWT_SECRET: "${JWT_ACCESS_SECRET:?}"
      JWT_EXPIRES_IN: "${JWT_ACCESS_TTL_SEC:?}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_TTL_SEC:?}"

      # 시뮬레이터 서버
      SIMULATOR_WS_URL: "${SIMULATOR_URL:?}"
      SIMULATOR_RECONNECT_ATTEMPTS: "${SIMULATOR_RECONNECT_ATTEMPTS:?}"
      SIMULATOR_TIMEOUT_MS: "${SIMULATOR_TIMEOUT_MS:?}"

      # Slack 웹훅
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:?}"

      # GitHub Secret/Variable에 없는 값 → health-backend/.env의 값을 고정으로 사용
      AI_AGENT_API_URL: "http://localhost:8000"
      LOG_DIR: "./logs"
      LOG_RETENTION_DAYS: "7"
      HEALTH_DATA_RETENTION_DAYS: "7"
    volumes:
      - logs:/app/logs

volumes:
  logs:
